###############################################
# Global settings
logLevel: debug
logDestinations: [stdout, file]
logFile: /shared-logs/mediamtx.log

# Authentication (HU 2.1): JWT validado contra el backend Rust vía JWKS.
# Consumir video (read/playback) EXIGE un token válido; sin token -> 401.
authMethod: jwt
authJWTJWKS: http://mediamtx-backend:8080/jwks
authJWTClaimKey: mediamtx_permissions
# El token se pasa por query (?jwt=<token>) o header Authorization: Bearer <token>.
# Acciones que NO exigen token:
#  - api/metrics/pprof: control interno (lo usa el agente); se restringen por red en HU 3.1.
#  - publish: los publishers internos (p.ej. mosaic) no envían token.
authJWTExclude:
- action: api
- action: metrics
- action: pprof
- action: publish

###############################################
# API
api: yes
apiAddress: 0.0.0.0:9997
apiEncryption: no
apiServerKey: server.key
apiServerCert: server.crt

###############################################
# Metrics (opcional para monitoreo)
metrics: yes
metricsAddress: :9998
metricsEncryption: no
metricsServerKey: server.key
metricsServerCert: server.crt

###############################################
# PPROF (solo si lo necesitas para profiling)
pprof: no
pprofAddress: :9999
pprofEncryption: no
pprofServerKey: server.key
pprofServerCert: server.crt

###############################################
# RTSP server
rtsp: yes
rtspTransports: [udp, multicast, tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]

###############################################
# RTMP server
rtmp: yes
rtmpAddress: :1935
rtmpEncryption: "no"
rtmpsAddress: :1936
rtmpServerKey: server.key
rtmpServerCert: server.crt

###############################################
# HLS server
hls: yes
hlsAddress: :8888
hlsEncryption: no
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAlwaysRemux: yes
hlsVariant: fmp4
hlsSegmentCount: 6
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsSegmentMaxSize: 50M
hlsDirectory: ""
hlsMuxerCloseAfter: 120s

###############################################
# WebRTC server
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcServerKey: server.key
webrtcServerCert: server.crt
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ""
webrtcIPsFromInterfaces: yes
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []
webrtcICEServers2: []
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s
webrtcSTUNGatherTimeout: 5s

###############################################
# SRT server (si no lo usas, puedes poner srt: no)
srt: yes
srtAddress: :8890

###############################################
# Default path settings
pathDefaults:
  source: publisher
  sourceFingerprint:
  sourceOnDemand: no
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s
  maxReaders: 0
  fallback:
  useAbsoluteTimestamp: false

  # Transporte para leer fuentes RTSP: TCP en todas.
  # Evita el error 'H264 packetization-mode=0 is only supported when reading with TCP'
  # y la pérdida de paquetes/MTU de UDP. Reversible: poner 'automatic' o quitar la línea.
  rtspTransport: tcp

  # Grabación por defecto
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
  recordFormat: fmp4
  recordPartDuration: 2s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 24h

  # Publisher
  overridePublisher: yes
  srtPublishPassphrase:

  # Hooks (por ahora sin usar, los puedes rellenar cuando quieras)
  runOnInit:
  runOnInitRestart: no
  runOnDemand:
  runOnDemandRestart: no
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:
  runOnReady:
  runOnReadyRestart: no
  runOnNotReady:
  runOnRead:
  runOnReadRestart: no
  runOnUnread:
  runOnRecordSegmentCreate:
  runOnRecordSegmentComplete:

###############################################
# Path settings
paths:

  # Entrnace cameras
  Camera-key:
    source: rtsp://user:password@127.0.0.1/axis-media/media.amp
    sourceFingerprint: ""
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
    recordFormat: fmp4
    recordPartDuration: 5s
    recordSegmentDuration: 1h
    recordDeleteAfter: 24h
    overridePublisher: no

  ~^live/.*$:
      source: publisher
      record: yes
      recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S
      recordFormat: fmp4
      recordPartDuration: 5s
      recordSegmentDuration: 1h
      recordDeleteAfter: 24h
      overridePublisher: yes
      sourceOnDemand: no