# =============================================================================
# Docker Compose - MediaMTX con Backend de Autenticación JWT
# =============================================================================
# 
# Servicios:
#   - mediamtx-backend: Backend Rust para autenticación JWT
#   - mediamtx: Servidor de streaming MediaMTX
#
# Uso:
#   docker compose down   # Detener servicios existentes
#   docker compose up --build
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend de Autenticación JWT (Rust + Axum)
  # ---------------------------------------------------------------------------
  mediamtx-backend:
    build: .
    container_name: mediamtx-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JWT_EXP_MINUTES=60
      - RUST_LOG=info
      # Clave de firma persistente (HU 2.2): sobrevive a reinicios.
      - JWT_PRIVATE_KEY_PATH=/keys/jwt_private_key.pem
      # Credenciales por proyecto (HU 2.2): archivo JSON con secretos hasheados.
      - CLIENTS_PATH=/config/clients.json
    volumes:
      - jwt-keys:/keys
      # Config con credenciales por proyecto (clients.json va gitignored).
      - ./config:/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mediamtx-network

  # ---------------------------------------------------------------------------
  # MediaMTX - Servidor de Streaming
  # ---------------------------------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:1.19.2
    container_name: mediamtx
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
      # Log compartido para que el agente lo lea (solo lectura del lado del agente)
      - shared-logs:/shared-logs
    command: ["/mediamtx.yml"]
    ports:
      # RTSP
      - "8554:8554"
      - "8322:8322"
      # RTMP
      - "1935:1935"
      - "1936:1936"
      # HLS
      - "8888:8888"
      # WebRTC
      - "8889:8889"
      # WebRTC UDP (ICE)
      - "8189:8189/udp"
      # API
      - "9997:9997"
      # Metrics
      - "9998:9998"
      # RTP/RTCP
      - "8000:8000/udp"
      - "8001:8001/udp"
      # Multicast RTP/RTCP
      - "8002:8002/udp"
      - "8003:8003/udp"
      # SRTP/SRTCP
      - "8004:8004/udp"
      - "8005:8005/udp"
      # Multicast SRTP/SRTCP
      - "8006:8006/udp"
      - "8007:8007/udp"
      # SRT
      - "8890:8890/udp"
    depends_on:
      mediamtx-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mediamtx-network

  # ---------------------------------------------------------------------------
  # stream-agent - Agente de diagnóstico de cámaras (Fase 1, solo lectura)
  # ---------------------------------------------------------------------------
  stream-agent:
    build: ./agent
    container_name: stream-agent
    ports:
      # Solo loopback: no accesible desde internet (HU 1.3)
      - "127.0.0.1:8090:8090"
    # Secretos (GEMINI_API_KEY, SLACK_WEBHOOK_URL) desde agent/.env.
    # Opcional: si el archivo no existe, no falla (required: false).
    env_file:
      - path: ./agent/.env
        required: false
    environment:
      - PORT=8090
      - LOG_LEVEL=info
      # URLs internas del compose (config no sensible).
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_HLS_URL=http://mediamtx:8888
      - MEDIAMTX_LOG_PATH=/shared-logs/mediamtx.log
    volumes:
      # Lee el log de MediaMTX en solo lectura (HU 1.3: el agente solo observa)
      - shared-logs:/shared-logs:ro
    depends_on:
      - mediamtx
    restart: unless-stopped
    networks:
      - mediamtx-network

  # ---------------------------------------------------------------------------
  # Caddy - Frente HTTPS (termina TLS, reenvía a backend y a HLS de MediaMTX)
  # ---------------------------------------------------------------------------
  caddy:
    build: ./caddy   # Caddy + plugin caddy-ratelimit (ver caddy/Dockerfile)
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Dev: 'localhost' con TLS interno (autofirmado).
      # LAN: tu-host (con DNS/hosts). Producción: tu-dominio (quita 'tls internal').
      - CADDY_SITE_ADDRESS=localhost
      # Rate limit por IP.
      - RATE_LIMIT_EVENTS=120
      - RATE_LIMIT_WINDOW=1m
      # Orígenes CORS permitidos (regex de Origin). Default: ninguno.
      # Escapar $ como $$ en compose, p.ej.:
      # - CORS_ALLOWED_ORIGINS=^https://(app\.carmi\.com)$$
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mediamtx-backend
      - mediamtx
    restart: unless-stopped
    networks:
      - mediamtx-network

networks:
  mediamtx-network:
    driver: bridge

volumes:
  shared-logs:
  jwt-keys:
  caddy-data:
  caddy-config:
